name: Verification CI

on:
  push:
    branches: [ "main", "done" ]
  pull_request:
    branches: [ "main", "done" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        cache: 'npm'
        node-version: 22.x

    - name: Install dependencies
      run: npm ci

    - name: Initialize Database & Seeding
      run: |
        cp .env.example .env
        npx prisma generate
        npx prisma db push
        npx prisma db seed

    - name: Run ESLint
      run: npm run lint

    - name: Run TypeScript Verification
      run: npx tsc --noEmit

    - name: Run Enclave Integration Smoke Tests
      run: npm run smoke:step5
      env:
        T3N_AGENT_PRIVATE_KEY: "0x54363dc0fc421addbfcbe438649866ed7bf43f8fdc629019a31aeb71aa68004b"
        T3N_AGENT_DID: "did:t3n:c9f6b88a0751923e458e9b07cb74d7e809d985f3"
        T3N_DEMO_BUYER_PRIVATE_KEY: "0x11223344556677889900aabbccddeeff11223344556677889900aabbccddeeff"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
